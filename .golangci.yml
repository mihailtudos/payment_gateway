version: "2"
linters:
  default: "none"
  enable:
    - "bidichk"
    # - "depguard" - fails everything maybe bring in if we need to stop pkgs coming in
    # - "errcheck" - fix issues
    # - "gocritic" - fix issues
    - "perfsprint"
    # - "prealloc" - fix errors
    - "predeclared"
    - "rowserrcheck"
    - "spancheck"
    - "tparallel"
    - "usetesting"
    - "misspell"
    - "bodyclose"
    - "dogsled"
    - "errname"
    - "errorlint"
    - "forbidigo"
    - "goprintffuncname"
    - "gosec"
    - "govet"
    - "importas"
    - "ineffassign"
    - "makezero"
    - "promlinter"
    - "revive"
    - "staticcheck"
    - "unconvert"
    - "unused"
    - "wastedassign"
    - "whitespace"
  settings:
    forbidigo:
      forbid:
        - pattern: "fmt\\.Print.*"
          msg: "Do not commit code with fmt.Print statements"
    gosec:
      excludes:
        - "G115"
        - "G704"
  exclusions:
    generated: "lax"
    presets:
      - "comments"
      - "common-false-positives"
      - "legacy"
      - "std-error-handling"
    rules:
      - linters:
          - "forbidigo"
        path: "scripts/synthetic_data/"
      - linters:
          - "revive"
        path: "models/api/"
      - linters:
          - "revive"
        path: "scripts/synthetic_data/encoding/"
      - linters:
          - "gosec"
        path: "_test.go"
        text: "G101"
    paths:
      - "third_party$"
      - "builtin$"
      - "examples$"
formatters:
  enable:
    - "gofmt"
    - "gofumpt"
    - "goimports"
  settings:
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
    goimports:
      local-prefixes:
        - "github.com/infactsystems/core-service"
  exclusions:
    generated: "lax"
    paths:
      - "third_party$"
      - "builtin$"
      - "examples$"
